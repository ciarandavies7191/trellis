pipeline:
  id: pdf_summarize
  goal: "Load a PDF from URL and summarize key points"
  tasks:
    - id: ingest_pdf
      tool: ingest_document
      inputs:
        path: "https://www.princexml.com/samples/newsletter/drylab.pdf"

    - id: extract_content
      tool: extract_from_texts
      inputs:
        document: "{{ingest_pdf.output}}"
        prompt: "Extract the main topics, key announcements, and any notable metrics or figures mentioned"

    - id: summarize_pdf
      tool: llm_job
      inputs:
        prompt: |
          Summarize the following extracted content in 5 concise bullet points for a busy executive.
          Focus on key announcements, product updates, and any notable metrics.

          {{extract_content.output}}
        temperature: 0.3
        max_tokens: 256
