pipeline:
  id: discovery
  goal: >
    Load the income statement schema and spreading manual, resolve fiscal periods
    to derive the prior-year comparative date, fetch the Alphabet Q1 2025 10-Q
    from SEC EDGAR, and store all references for downstream sub-pipelines.
  inputs:
    company: "Alphabet Inc."
    ticker: "GOOGL"
    period_end: "2025-03-31"
    schema_path: "examples/data/income_statement_schema.json"
    manual_path: "examples/data/spreading_manual_income_statement.md"

  tasks:

    # ── 1. Load schema and manual in parallel ─────────────────────────────────
    - id: load_schema
      tool: load_schema
      inputs:
        source: "{{pipeline.inputs.schema_path}}"

    - id: ingest_manual
      tool: ingest_document
      inputs:
        path: "{{pipeline.inputs.manual_path}}"

    # ── 2. Resolve fiscal periods ─────────────────────────────────────────────
    # fiscal_period_logic returns [FY descriptor, ytd_current, ytd_prior].
    # For 2025-03-31 (Q1): [FY 2024, Q1 2025, Q1 2024].
    # We store .last.period_end = "2024-03-31" as the prior-year period end.
    - id: resolve_periods
      tool: compute
      inputs:
        function: fiscal_period_logic
        as_of_date: "{{pipeline.inputs.period_end}}"
        company: "{{pipeline.inputs.company}}"

    # ── 3. Fetch the Q1 2025 10-Q from SEC EDGAR ─────────────────────────────
    - id: fetch_filing
      tool: fetch_data
      inputs:
        source: sec_edgar
        ticker: "{{pipeline.inputs.ticker}}"
        period_end: "{{pipeline.inputs.period_end}}"
        period_type: quarterly
        count: 1

    # ── 4. Store references for downstream pipelines ──────────────────────────
    - id: store_schema
      tool: store
      inputs:
        key: schema
        value: "{{load_schema.output}}"

    - id: store_manual
      tool: store
      inputs:
        key: manual
        value: "{{ingest_manual.output}}"

    - id: store_filing_result
      tool: store
      inputs:
        key: filing_result
        value: "{{fetch_filing.output}}"

    # Store the prior-year period end date ("2024-03-31") derived from
    # fiscal_period_logic so the extraction pipeline can reference it without
    # re-running the compute step.
    - id: store_period_end_prior
      tool: store
      inputs:
        key: period_end_prior
        value: "{{resolve_periods.output.last.period_end}}"
