# ─────────────────────────────────────────────
# PIPELINE 2: data_acquisition
# ─────────────────────────────────────────────
pipeline:
  id: data_acquisition
  goal: >
    Fetch SEC financial statement filings for GOOGL across all resolved periods,
    and load the spreading template and manual documents.
  inputs:
    template_path: "examples/data/spreading_template_income_statement.md"
    manual_path: "examples/data/spreading_template_income_statement.md"

  tasks:

    - id: fetch_filings
      tool: fetch_data
      parallel_over: "{{session.periods}}"
      inputs:
        source: sec_edgar
        ticker: "{{session.ticker}}"
        period_end: "{{item.period_end}}"
        period_type: "{{item.period_type}}"
        statement_types: [income_statement, balance_sheet, cash_flow_statement]

    - id: ingest_filings
      tool: ingest_document
      inputs:
        path: "{{fetch_filings.output}}"

    - id: ingest_template
      tool: ingest_document
      inputs:
        path: "{{pipeline.inputs.template_path}}"

    - id: ingest_manual
      tool: ingest_document
      inputs:
        path: "{{pipeline.inputs.manual_path}}"

    - id: store_filings
      tool: store
      inputs:
        key: filings
        value: "{{ingest_filings.output}}"

    - id: store_template_document
      tool: store
      inputs:
        key: template_document
        value: "{{ingest_template.output}}"

    - id: store_manual_document
      tool: store
      inputs:
        key: manual_document
        value: "{{ingest_manual.output}}"