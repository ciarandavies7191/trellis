pipeline:
  id: extraction
  goal: >
    Ingest the Q1 2025 10-Q, select pages for each income statement section,
    extract all schema fields for both Q1 2025 and Q1 2024, merge per-section
    extractions into two complete period dicts, and store them.
  inputs:
    period_end: "2025-03-31"

  tasks:

    # ── 1. Ingest the 10-Q filing ─────────────────────────────────────────────
    # filing_result is the full fetch_data output dict; ingest_document resolves
    # the filing URL(s) from the sec_edgar result wrapper automatically.
    - id: ingest_filing
      tool: ingest_document
      inputs:
        path: "{{session.filing_result}}"

    # ── 2. Select pages per income statement section (run in parallel) ─────────
    - id: select_face
      tool: select
      inputs:
        document: "{{ingest_filing.output}}"
        prompt: >
          Select only the pages containing the Consolidated Statements of Income
          (Operations). Include: all revenue line items, cost of revenues, R&D,
          sales and marketing, G&A, restructuring charges, total operating
          expenses, operating income, other income/expense net, income before
          taxes, provision for income taxes, and net income. Exclude: balance
          sheet, cash flow statement, equity statement, cover pages, risk
          factors, and footnotes.

    - id: select_segments
      tool: select
      inputs:
        document: "{{ingest_filing.output}}"
        prompt: >
          Select only the pages containing the revenue disaggregation by business
          segment (Google Services, Google Cloud, Other Bets) and segment
          operating income. This is typically a Segment Information footnote or
          a Revenue Disaggregation note. Include tables showing both segment
          revenues and segment operating income. Exclude the consolidated income
          statement face, balance sheet, and unrelated footnotes.

    - id: select_other_income
      tool: select
      inputs:
        document: "{{ingest_filing.output}}"
        prompt: >
          Select only the pages containing the Other Income (Expense), Net
          footnote or table. This table shows the breakdown of non-operating
          items: interest income, interest expense, foreign exchange gains or
          losses, gains or losses on equity securities and investments, and
          other non-operating items. Exclude all other sections.

    - id: select_per_share
      tool: select
      inputs:
        document: "{{ingest_filing.output}}"
        prompt: >
          Select only the pages containing the earnings per share (EPS) note or
          computation table showing: basic EPS, diluted EPS, weighted average
          shares outstanding basic, and weighted average shares outstanding
          diluted. This is typically a Note on Net Income Per Share. Exclude all
          other sections.

    # ── 3. Extract face statement fields — both periods ────────────────────────
    - id: extract_face_current
      tool: extract_fields
      inputs:
        document: "{{select_face.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{pipeline.inputs.period_end}}"
        section_filter: "face"

    - id: extract_face_prior
      tool: extract_fields
      inputs:
        document: "{{select_face.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{session.period_end_prior}}"
        section_filter: "face"

    # ── 4. Extract segment fields — both periods ───────────────────────────────
    - id: extract_segments_current
      tool: extract_fields
      inputs:
        document: "{{select_segments.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{pipeline.inputs.period_end}}"
        section_filter: "segments"

    - id: extract_segments_prior
      tool: extract_fields
      inputs:
        document: "{{select_segments.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{session.period_end_prior}}"
        section_filter: "segments"

    # ── 5. Extract other income fields — both periods ──────────────────────────
    - id: extract_other_income_current
      tool: extract_fields
      inputs:
        document: "{{select_other_income.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{pipeline.inputs.period_end}}"
        section_filter: "other_income"

    - id: extract_other_income_prior
      tool: extract_fields
      inputs:
        document: "{{select_other_income.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{session.period_end_prior}}"
        section_filter: "other_income"

    # ── 6. Extract per-share fields — both periods ─────────────────────────────
    - id: extract_per_share_current
      tool: extract_fields
      inputs:
        document: "{{select_per_share.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{pipeline.inputs.period_end}}"
        section_filter: "per_share"

    - id: extract_per_share_prior
      tool: extract_fields
      inputs:
        document: "{{select_per_share.output}}"
        schema: "{{session.schema}}"
        rules: "{{session.manual}}"
        period_end: "{{session.period_end_prior}}"
        section_filter: "per_share"

    # ── 7. Merge all four section dicts into one dict per period ───────────────
    # The merge step produces a JSON array with one element ([{...}]) so that
    # calculate_derived_fields (called in output_generation) can parse it
    # as a list of period dicts without type coercion issues.
    - id: merge_current
      tool: llm_job
      inputs:
        face: "{{extract_face_current.output}}"
        segments: "{{extract_segments_current.output}}"
        other_income: "{{extract_other_income_current.output}}"
        per_share: "{{extract_per_share_current.output}}"
        prompt: |
          Merge the four income statement section dicts above (face, segments,
          other_income, per_share) — all extracted for the same period Q1 2025 —
          into a single flat JSON object. Rules:
          1. Include every key from every dict.
          2. Where the same key appears in multiple dicts and values conflict,
             keep the non-"__not_found__" value; if both are non-sentinel, keep
             the value from the first dict (face takes priority over segments, etc.).
          3. Do not add, rename, or recompute any fields.
          4. Return a JSON ARRAY containing exactly ONE element — the merged dict:
             [{ "field1": "value1", "field2": "value2", ... }]
          Return ONLY valid JSON, no commentary, no markdown fencing.
        temperature: 0.0
        max_tokens: 3000

    - id: merge_prior
      tool: llm_job
      inputs:
        face: "{{extract_face_prior.output}}"
        segments: "{{extract_segments_prior.output}}"
        other_income: "{{extract_other_income_prior.output}}"
        per_share: "{{extract_per_share_prior.output}}"
        prompt: |
          Merge the four income statement section dicts above (face, segments,
          other_income, per_share) — all extracted for the same period Q1 2024 —
          into a single flat JSON object. Rules:
          1. Include every key from every dict.
          2. Where the same key appears in multiple dicts and values conflict,
             keep the non-"__not_found__" value; if both are non-sentinel, keep
             the value from the first dict.
          3. Do not add, rename, or recompute any fields.
          4. Return a JSON ARRAY containing exactly ONE element — the merged dict:
             [{ "field1": "value1", "field2": "value2", ... }]
          Return ONLY valid JSON, no commentary, no markdown fencing.
        temperature: 0.0
        max_tokens: 3000

    # ── 8. Store the merged period dicts ──────────────────────────────────────
    - id: store_extracted_current
      tool: store
      inputs:
        key: extracted_current
        value: "{{merge_current.output}}"

    - id: store_extracted_prior
      tool: store
      inputs:
        key: extracted_prior
        value: "{{merge_prior.output}}"
