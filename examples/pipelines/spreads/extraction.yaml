# ─────────────────────────────────────────────
# PIPELINE 3: extraction
# ─────────────────────────────────────────────
pipeline:
  id: extraction
  goal: >
    Derive the output field schema from the spreading template. For each
    filing, select only the income statement pages to reduce context size.
    Then for each resolved period, extract the relevant field values from
    the filtered pages, using period_end to focus on the correct column.

  tasks:

    - id: load_output_schema
      tool: load_schema
      inputs:
        source: "{{session.template_document}}"
        hint: >
          The column headers in the first sheet define the field names.
          Each header is a field the extraction must populate.

    - id: select_pages
      tool: select
      parallel_over: "{{session.filings}}"
      inputs:
        document: "{{item}}"
        prompt: >
          Pages containing the consolidated income statement (also titled
          "Statements of Operations" or "Statements of Earnings"), including
          the comparative period columns. Also include any segment revenue
          footnote page and any other income / non-operating income footnote.
          Exclude cover pages, risk factors, legal proceedings, and exhibits.

    - id: extract_fields
      tool: extract_fields
      parallel_over: "{{session.periods}}"
      inputs:
        document: "{{select_pages.output}}"
        schema: "{{load_output_schema.output}}"
        rules: "{{session.manual_document}}"
        period_end: "{{item.period_end}}"

    - id: store_extracted_fields
      tool: store
      inputs:
        key: extracted_fields
        value: "{{extract_fields.output}}"
