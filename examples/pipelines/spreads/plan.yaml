plan:
  id: google_financial_spreading
  goal: >
    Pull SEC financial statements for Google (Alphabet Inc.) for the period ending
    March 31 2025, extract values for all template fields following the spreading
    manual, populate the output template, and produce an Excel and Markdown output.
  inputs:
    company: Google
    as_of_period: "2025-03-31"
    template_path: "spreading_template_income_statement.md"
    manual_path: "spreading_template_income_statement.md"

  sub_pipelines:

    - id: discovery
      goal: >
        Resolve the company ticker for Google and determine the correct set of
        fiscal periods to pull based on the as_of_period.
      reads: []
      stores: [ticker, periods]
      inputs: [company, as_of_period]

    - id: data_acquisition
      goal: >
        Fetch SEC financial statement filings for each resolved period, and load
        the spreading template and manual into document handles.
      reads: [ticker, periods]
      stores: [filings, template_document, manual_document]
      inputs: [template_path, manual_path]

    - id: extraction
      goal: >
        Derive the output schema from the template, then for each filing select
        the relevant financial statement pages and extract field values guided
        by the spreading manual.
      reads: [filings, template_document, manual_document]
      stores: [extracted_fields]

    - id: output_generation
      goal: >
        Populate the spreading template with the extracted field values and
        produce an Excel file and a Markdown summary report.
      reads: [extracted_fields, template_document]
      stores: []
      inputs: [company, as_of_period]