plan:
  id: google_financial_spreading
  goal: >
    Pull SEC financial statements for Google (Alphabet Inc.) for the period ending
    March 31 2025, extract values for all template fields following the spreading
    manual, populate the output template, and produce an Excel and Markdown output.
  inputs:
    company: "Alphabet Inc."
    as_of_period: "2025-03-31"
    template_path: "examples/data/spreading_template_income_statement.md"
    manual_path: "examples/data/spreading_manual_income_statement.md"

  sub_pipelines:

    - id: discovery
      goal: >
        Resolve the company ticker for Google and determine the correct set of
        fiscal periods to pull based on the as_of_period.
      reads: []
      stores: [ticker, periods]
      inputs: [company, as_of_period]

    - id: data_acquisition
      goal: >
        Fetch SEC financial statement filings for each resolved period, and load
        the spreading template and manual into document handles.
      reads: [ticker, periods]
      stores: [filings, template_document, manual_document]
      inputs: [template_path, manual_path]

    - id: extraction
      goal: >
        Load the enriched income-statement schema, select section-specific pages from
        each filing, extract each section independently per period, assemble sections,
        compute derived fields deterministically, validate arithmetic cross-checks,
        correct any failures, and store final per-period field dicts.
      reads: [filings, manual_document, periods]
      stores: [extracted_fields]

    - id: output_generation
      goal: >
        Apply segment names to validated extracted data, generate analyst notes
        and document header from validated figures, and write JSON and Markdown
        output files.
      reads: [extracted_fields, periods, filings]
      stores: []
      inputs: [company, as_of_period]