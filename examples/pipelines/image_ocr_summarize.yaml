pipeline:
  id: image_ocr_summarize
  goal: "Ingest a PDF (including OCR for scanned pages), select relevant pages, extract text, then summarize"
  tasks:
    - id: ingest_doc
      tool: ingest_document
      inputs:
        path: "./examples/data/Small-Foundation-Annual-Report-2019.pdf"
        # OCR is applied automatically to any scanned pages during ingest

    - id: select_pages
      tool: select
      inputs:
        document: "{{ingest_doc.output}}"
        prompt: "pages 2, 3, and 4"

    - id: extract_content
      tool: extract_from_texts
      inputs:
        document: "{{select_pages.output}}"
        prompt: "Extract the key programme areas, financial highlights, and any notable figures or outcomes"
        # Optional: override litellm model, e.g. "openai/gpt-4o"
        model: "openai/gpt-4o"

    - id: summarize_content
      tool: llm_job
      inputs:
        prompt: |
          You are a helpful assistant. Summarize the extracted content in 3 concise bullet points.
          If the content is very short, still produce a brief, accurate summary.

          Extracted content:
          {{extract_content.output}}
        temperature: 0.3
        max_tokens: 200
